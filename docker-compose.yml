name: code-trainer-frontend

services:
  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/ssl:/etc/nginx/ssl:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
