name: code-trainer-frontend

services:
  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    networks:
      - code-trainer-net

networks:
  code-trainer-net:
    name: code-trainer-net
    external: true
